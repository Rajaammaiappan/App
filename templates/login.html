<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Vehicle Loan Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0a2540 0%, #163a60 50%, #0a2540 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-wrap { width: 100%; max-width: 420px; padding: 1rem; }
    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
      overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, #0057b8, #0a2540);
      padding: 2.2rem 2rem;
      text-align: center;
      color: #fff;
    }
    .login-header .brand-icon {
      width: 64px; height: 64px;
      background: rgba(255,255,255,.15);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.8rem;
    }
    .login-header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
    .login-header p { opacity: .8; font-size: .85rem; margin: .3rem 0 0; }
    .login-body { padding: 2rem; }
    .form-label { font-weight: 600; font-size: .85rem; color: #374151; }
    .form-control {
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      padding: .65rem 1rem;
      font-size: .9rem;
    }
    .form-control:focus {
      border-color: #0057b8;
      box-shadow: 0 0 0 3px rgba(0,87,184,.1);
    }
    .btn-login {
      background: #0057b8;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .75rem;
      font-size: .95rem;
      font-weight: 600;
      width: 100%;
      transition: .2s;
    }
    .btn-login:hover { background: #004494; transform: translateY(-1px); }
    .demo-accounts {
      background: #f8f9fb;
      border-radius: 10px;
      padding: .9rem 1rem;
      margin-top: 1.2rem;
    }
    .demo-accounts h6 { font-size: .75rem; color: #6b7280; font-weight: 700; text-transform: uppercase; margin-bottom: .6rem; }
    .demo-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .3rem 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: .82rem;
    }
    .demo-item:last-child { border-bottom: none; }
    .demo-item .role { font-weight: 600; color: #374151; }
    .demo-item .creds { color: #6b7280; font-family: monospace; }
    .alert { border-radius: 10px; border: none; font-size: .85rem; }
    .alert-danger { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <div class="brand-icon"><i class="bi bi-car-front-fill"></i></div>
      <h1>Vehicle Loan Manager</h1>
      <p>Sign in to your account</p>
    </div>
    <div class="login-body">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} mb-3">
          <i class="bi bi-exclamation-triangle me-1"></i> {{ message }}
        </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="/login">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <div class="demo-accounts">
        <h6>Default Accounts</h6>
        <div class="demo-item">
          <span class="role">Admin</span>
          <span class="creds">admin / admin123</span>
        </div>
        <div class="demo-item">
          <span class="role">Manager</span>
          <span class="creds">manager / manager123</span>
        </div>
        <div class="demo-item">
          <span class="role">Viewer</span>
          <span class="creds">viewer / viewer123</span>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
