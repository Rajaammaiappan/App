<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vehicle Loan Manager — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f0f4f8;}</style>
</head>
<body>
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    {% with msgs=get_flashed_messages(with_categories=true) %}
      {% for cat,msg in msgs %}
      <div class="alert alert-{{ 'success' if cat=='success' else 'danger' }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <div class="card shadow border-0" style="border-radius:12px;">
      <div class="card-body p-4">
        <div class="text-center mb-3">
          <div style="font-size:40px;">🚗</div>
          <h4 class="fw-bold">Vehicle Loan Manager</h4>
          <p class="text-muted small">Sign in to continue</p>
        </div>
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input name="username" class="form-control" autocomplete="username" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input name="password" type="password" class="form-control" autocomplete="current-password" required>
          </div>
          <button class="btn btn-primary w-100 py-2 fw-bold">Sign In</button>
        </form>
        <hr>
        <p class="text-muted small mb-0 text-center">
          Default logins: <code>admin/admin123</code> &middot; <code>manager/manager123</code> &middot; <code>viewer/viewer123</code>
        </p>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
