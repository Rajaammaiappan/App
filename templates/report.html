{% extends "base.html" %}
{% block content %}
<h4 class="fw-bold mb-4">📋 Generate PDF Report</h4>
<div class="card col-md-6">
  <div class="card-body">
    {% if not REPORTLAB_AVAILABLE %}
    <div class="alert alert-warning">
      <strong>reportlab not installed.</strong> Add <code>reportlab</code> to your requirements.txt and redeploy.
    </div>
    {% endif %}
    <p class="text-muted">The report includes KPI summary, all loans table, and overdue EMIs.</p>
    <form method="post">
      <button class="btn btn-danger px-4" {% if not REPORTLAB_AVAILABLE %}disabled{% endif %}>
        <i class="bi bi-file-pdf me-2"></i>Download PDF Report
      </button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary ms-2">Back to Dashboard</a>
    </form>
  </div>
</div>
{% endblock %}
