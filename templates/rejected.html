{% extends "base.html" %}
{% block content %}
<h4 class="fw-bold mb-4">❌ Rejected Loans</h4>
<form class="d-flex mb-3 gap-2" method="get">
  <input name="q" value="{{ q }}" class="form-control search-bar" placeholder="Search...">
  <button class="btn btn-outline-primary">Search</button>
  <a href="{{ url_for('rejected') }}" class="btn btn-outline-secondary">Clear</a>
</form>
<div class="card"><div class="card-body p-0"><div class="table-responsive">
<table class="table table-hover table-striped mb-0">
  <thead class="table-dark"><tr>
    <th>Loan ID</th><th>Loan #</th><th>Customer</th><th>Reason</th><th>Rejected At</th>
  </tr></thead>
  <tbody>
  {% for l in loans %}
  <tr>
    <td>{{ l.loan_id }}</td><td><strong>{{ l.loan_number }}</strong></td>
    <td>{{ l.customer_name }}</td>
    <td><span class="text-danger">{{ l.reason }}</span></td>
    <td>{{ l.created_at[:10] }}</td>
  </tr>
  {% else %}
  <tr><td colspan="5" class="text-center text-muted py-4">No rejected loans.</td></tr>
  {% endfor %}
  </tbody>
</table>
</div></div></div>
{% endblock %}
